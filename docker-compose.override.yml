services:
  gateway:
    image: hermes-agent:fork
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - !reset ~/.hermes:/opt/data
      - ./hermes-data:/opt/data
      - ./my-skills:/opt/data/external-skills:ro
    environment:
      # Messaging
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_ALLOWED_USERS=${DISCORD_ALLOWED_USERS}
      - DISCORD_HOME_CHANNEL=${DISCORD_HOME_CHANNEL:-}
      - DISCORD_REQUIRE_MENTION=${DISCORD_REQUIRE_MENTION:-true}
      - DISCORD_FREE_RESPONSE_CHANNELS=${DISCORD_FREE_RESPONSE_CHANNELS:-}
      - DISCORD_AUTO_THREAD=${DISCORD_AUTO_THREAD:-false}
      - GATEWAY_ALLOW_ALL_USERS=${GATEWAY_ALLOW_ALL_USERS:-false}

      # On-chain
      - BLOCKSCOUT_API_KEY=${BLOCKSCOUT_API_KEY}
      - ALCHEMY_API_KEY=${ALCHEMY_API_KEY}
      - CRYPTOPANIC_API_KEY=${CRYPTOPANIC_API_KEY}

      # Gmail OAuth
      - GMAIL_CLIENT_ID=${GMAIL_CLIENT_ID}
      - GMAIL_CLIENT_SECRET=${GMAIL_CLIENT_SECRET}

      # OSINT / threat-intel
      - HUNTER_API_KEY=${HUNTER_API_KEY}
      - ABSTRACT_API_KEY=${ABSTRACT_API_KEY}
      - EMAILREP_API_KEY=${EMAILREP_API_KEY}
      - NUMVERIFY_API_KEY=${NUMVERIFY_API_KEY}
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY}
      - URLSCAN_API_KEY=${URLSCAN_API_KEY}
      - OTX_API_KEY=${OTX_API_KEY}
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY}
      - CENSYS_API_KEY=${CENSYS_API_KEY}
      - IPQS_API_KEY=${IPQS_API_KEY}
      - DEHASHED_API_KEY=${DEHASHED_API_KEY}
      - BREACHDIRECTORY_VIA_RAPIDAPI_API_KEY=${BREACHDIRECTORY_VIA_RAPIDAPI_API_KEY}

      - ASCEND_SCRAPPER_URL=${ASCEND_SCRAPPER_URL}

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.fork
    image: hermes-agent:fork-tui
    network_mode: !reset null
    ports:
      - "127.0.0.1:9119:9119"
    volumes:
      - !reset ~/.hermes:/opt/data
      - ./hermes-data:/opt/data
      - ./my-skills:/opt/data/external-skills:ro
    command: ["dashboard", "--host", "0.0.0.0", "--port", "9119", "--insecure", "--no-open", "--tui"]
